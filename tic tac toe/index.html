<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>

        <div class="game-info">
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">Player 1 (X)</span>
                    <span class="score-value" id="scoreX">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">Draws</span>
                    <span class="score-value" id="scoreDraw">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">Player 2 (O)</span>
                    <span class="score-value" id="scoreO">0</span>
                </div>
            </div>
        </div>

        <div class="game-status-info">
            <p>Current Player: <span id="currentPlayer" class="player-x">X</span></p>
            <p id="gameStatus" class="game-status"></p>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="button-group">
            <button id="resetBtn" class="btn btn-primary">New Game</button>
            <button id="resetScoreBtn" class="btn btn-secondary">Reset Score</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
